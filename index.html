<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghubungkan...</title>

    <!-- META PIXEL -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '987442507122279');
        fbq('track', 'PageView');
    </script>
    <noscript>
        <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=987442507122279&ev=PageView&noscript=1"/>
    </noscript>
    <!-- END META PIXEL -->

    <script>
        // ─── CONFIG ───────────────────────────────────────────────────────────────
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS66cskVgSl8OV_WmoRJZdd6ya6EVDIzXdr3w_hIx1MtkWZhYJKc4yGne84xIpQXWp/exec";

        // Fallback agents kalau Apps Script timeout / error
        const FALLBACK_AGENTS = [
            { number: "6282294009151", name: "Pak Kibi",   code: "51" },
            { number: "6287854926871", name: "Pak Dani",   code: "71" },
            { number: "6281280147354", name: "Pak Guntur", code: "54" },
        ];

        // Pesan per agent — "M" = kode lead dari Meta Ads
        const MESSAGE_MAP = {
            "51": "Halo Pak Kibi M, saya mau tanya unitnya",
            "71": "Halo Pak Dani M, saya mau tanya unitnya",
            "54": "Halo Pak Guntur M, saya mau tanya unitnya",
        };
        // ──────────────────────────────────────────────────────────────────────────

        // Ambil semua UTM + fbclid dari URL
        function getUTM() {
            const p = new URLSearchParams(window.location.search);
            return {
                utm_source:   p.get('utm_source')   || '',
                utm_medium:   p.get('utm_medium')   || '',
                utm_campaign: p.get('utm_campaign') || '',
                utm_content:  p.get('utm_content')  || '',
                utm_term:     p.get('utm_term')      || '',
                fbclid:       p.get('fbclid')        || '',
            };
        }

        // Fire AddToCart pixel lalu tunggu 300ms agar request sempat terkirim
        function firePixelAndWait(utm, agentName) {
            return new Promise((resolve) => {
                fbq('track', 'AddToCart', {
                    content_ids:  ['UNIT-PROPERTI-001'],
                    content_name:  utm.utm_campaign || 'Properti',
                    content_type: 'product',
                    value:         500000000,
                    currency:      'IDR',
                    num_items:     1,
                    utm_source:    utm.utm_source,
                    utm_medium:    utm.utm_medium,
                    utm_campaign:  utm.utm_campaign,
                    utm_content:   utm.utm_content,
                    utm_term:      utm.utm_term,
                    fbclid:        utm.fbclid,
                    wa_agent:      agentName,
                }, { eventID: 'atc_' + Date.now() });

                console.log('[Pixel] AddToCart fired →', agentName);

                // 300ms = sweet spot untuk mayoritas koneksi Indonesia
                setTimeout(resolve, 300);
            });
        }

        // Fallback: round-robin via localStorage
        function getFallbackAgent() {
            let idx = parseInt(localStorage.getItem("wa_index") || "0");
            const agent = FALLBACK_AGENTS[idx % FALLBACK_AGENTS.length];
            localStorage.setItem("wa_index", String((idx + 1) % FALLBACK_AGENTS.length));
            console.warn('[Rotator] Fallback agent:', agent.name);
            return agent;
        }

        async function rotate() {
            const utm = getUTM();

            // Kirim UTM ke Apps Script untuk rotasi & logging
            const params = new URLSearchParams({
                campaign: utm.utm_campaign,
                adset:    utm.utm_content,
                ad:       utm.utm_term,
                source:   utm.utm_source,
                medium:   utm.utm_medium,
                fbclid:   utm.fbclid,
            });

            let agent;
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 4000);

            try {
                const res  = await fetch(APPS_SCRIPT_URL + "?" + params.toString(), { signal: controller.signal });
                clearTimeout(timeout);
                const data = await res.json();
                if (data.status !== "ok") throw new Error(data.message || "status not ok");
                agent = data;
                console.log('[Rotator] Agent dari server:', agent.name);
            } catch (err) {
                clearTimeout(timeout);
                agent = getFallbackAgent();
            }

            // Pastikan code selalu string agar MESSAGE_MAP lookup tidak meleset
            const code    = String(agent.code);
            const message = MESSAGE_MAP[code] || "Halo, saya mau tanya unitnya";
            const encoded = encodeURIComponent(message);

            // Fire pixel dulu, baru redirect langsung ke wa.me (tanpa hop tambahan)
            await firePixelAndWait(utm, agent.name);

            // ✅ Direct wa.me — tidak ada redirect chain, format chat WA selalu normal
            window.location.href = "https://wa.me/" + agent.number + "?text=" + encoded;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green:      #25D366;
            --green-dark: #1da851;
            --green-glow: rgba(37, 211, 102, 0.35);
            --bg:         #0d1f15;
            --card:       #132019;
            --text:       #e8f5ec;
            --muted:      #6b9478;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(37,211,102,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(37,211,102,0.12);
            border-radius: 24px;
            padding: 44px 40px;
            text-align: center;
            width: min(340px, 92vw);
            position: relative;
            animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1); }
        }

        /* Rotating ring around icon */
        .ring {
            width: 88px;
            height: 88px;
            margin: 0 auto 24px;
            position: relative;
        }

        .ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--green);
            border-right-color: rgba(37,211,102,0.3);
            animation: spin 1.4s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .icon-wrap {
            width: 88px;
            height: 88px;
            background: var(--green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 28px var(--green-glow);
            animation: breathe 2s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 20px var(--green-glow); }
            50%       { box-shadow: 0 0 40px rgba(37,211,102,0.5); }
        }

        .icon-wrap svg { width: 44px; height: 44px; }

        h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 13.5px;
            color: var(--muted);
            line-height: 1.6;
        }

        p strong {
            color: var(--green);
            font-weight: 600;
        }

        /* Animated progress bar */
        .progress {
            margin-top: 28px;
            height: 3px;
            background: rgba(37,211,102,0.1);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--green-dark), var(--green));
            border-radius: 99px;
            animation: fill 1.2s cubic-bezier(.4,0,.2,1) forwards;
        }

        @keyframes fill {
            0%   { width: 0%; }
            60%  { width: 75%; }
            100% { width: 95%; }
        }

        .status {
            margin-top: 12px;
            font-size: 11px;
            color: rgba(107,148,120,0.6);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>
<body onload="rotate()">
    <div class="card">
        <div class="ring">
            <div class="icon-wrap">
                <!-- WhatsApp SVG -->
                <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 3C8.82 3 3 8.82 3 16c0 2.34.64 4.6 1.85 6.57L3 29l6.6-1.73A13 13 0 0 0 16 29c7.18 0 13-5.82 13-13S23.18 3 16 3zm0 23.5c-2.1 0-4.14-.57-5.9-1.64l-.42-.25-4.35 1.14 1.16-4.23-.27-.44A10.47 10.47 0 0 1 4.5 16C4.5 9.6 9.6 4.5 16 4.5S27.5 9.6 27.5 16 22.4 26.5 16 26.5zm5.75-7.87c-.31-.16-1.85-.91-2.14-1.01-.28-.1-.49-.16-.7.16-.2.31-.79 1.01-.97 1.22-.18.2-.35.23-.66.08-.31-.16-1.3-.48-2.48-1.53-.92-.82-1.54-1.83-1.72-2.14-.18-.31-.02-.48.13-.63.14-.14.31-.35.47-.53.16-.18.21-.31.31-.52.1-.2.05-.39-.03-.55-.08-.16-.7-1.69-.96-2.31-.25-.6-.51-.52-.7-.53h-.6c-.2 0-.52.07-.8.39-.27.31-1.05 1.02-1.05 2.5s1.08 2.9 1.23 3.1c.16.2 2.13 3.25 5.16 4.56.72.31 1.28.5 1.72.64.72.23 1.38.2 1.9.12.58-.09 1.85-.76 2.11-1.49.26-.73.26-1.35.18-1.49-.08-.13-.28-.2-.6-.36z" fill="white"/>
                </svg>
            </div>
        </div>

        <h2>Menghubungkan ke WhatsApp</h2>
        <p>Sedang menyiapkan chat dengan<br><strong>tim properti kami</strong></p>

        <div class="progress">
            <div class="progress-bar"></div>
        </div>
        <p class="status">Mohon tunggu sebentar...</p>
    </div>
</body>
</html>
