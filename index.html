<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WA Rotator</title>
    <!-- META PIXEL -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
        n.callMethod.apply(n,arguments):n.queue.push(arguments)};
        if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
        n.queue=[];t=b.createElement(e);t.async=!0;
        t.src=v;s=b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t,s)}(window, document,'script',
        'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '987442507122279');
        fbq('track', 'PageView');
    </script>
    <noscript>
        <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=987442507122279&ev=PageView&noscript=1"/>
    </noscript>
    <!-- END META PIXEL -->

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzS66cskVgSl8OV_WmoRJZdd6ya6EVDIzXdr3w_hIx1MtkWZhYJKc4yGne84xIpQXWp/exec";

        function getUTM() {
            const p = new URLSearchParams(window.location.search);
            return {
                utm_source:   p.get('utm_source')   || '',
                utm_medium:   p.get('utm_medium')   || '',
                utm_campaign: p.get('utm_campaign') || '',
                utm_content:  p.get('utm_content')  || '',
                utm_term:     p.get('utm_term')      || '',
                fbclid:       p.get('fbclid')        || '',
            };
        }

        function firePixelAndWait(utm, agentCode) {
            return new Promise((resolve) => {
                if (Math.random() <= 0.70) {
                    fbq('track', 'AddToCart', {
                        content_ids:  ['UNIT-PROPERTI-001'],
                        content_name:  utm.utm_campaign || 'Properti',
                        content_type: 'product',
                        value:         500000000,
                        currency:      'IDR',
                        num_items:     1,
                        utm_source:    utm.utm_source,
                        utm_medium:    utm.utm_medium,
                        utm_campaign:  utm.utm_campaign,
                        utm_content:   utm.utm_content,
                        utm_term:      utm.utm_term,
                        fbclid:        utm.fbclid,
                        wa_agent:      agentCode,
                    }, { eventID: 'atc_' + Date.now() });
                    console.log('[Pixel] AddToCart fired');
                } else {
                    console.log('[Pixel] PageView only');
                }
                setTimeout(resolve, 800);
            });
        }

        async function rotate() {
            const utm = getUTM();

            const params = new URLSearchParams({
                campaign: utm.utm_campaign,
                adset:    utm.utm_content,
                ad:       utm.utm_term,
                source:   utm.utm_source,
                medium:   utm.utm_medium,
                fbclid:   utm.fbclid,
            });

            let agent;
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 4000);

            try {
                const res  = await fetch(APPS_SCRIPT_URL + "?" + params.toString(), { signal: controller.signal });
                clearTimeout(timeout);
                const data = await res.json();
                if (data.status !== "ok") throw new Error(data.message);
                agent = data;
                console.log('[Rotator] Agent dari server:', agent.name);
            } catch (err) {
                clearTimeout(timeout);
                console.warn('[Rotator] Fallback localStorage:', err.message);
                const agents = [
                    { number: "6282294009151", name: "Pak Kibi",   code: "51" },
                    { number: "6287854926871", name: "Pak Dani",   code: "71" },
                    { number: "6281280147354", name: "Pak Guntur", code: "54" },
                ];
                let idx = parseInt(localStorage.getItem("wa_index") || "0");
                agent = agents[idx % agents.length];
                localStorage.setItem("wa_index", (idx + 1) % agents.length);
            }

            const messageMap = {
                "51": "Halo Pak Kibi M, saya mau tanya unitnya",
                "71": "Halo Pak Dani M, saya mau tanya unitnya",
                "54": "Halo Pak Guntur M, saya mau tanya unitnya",
            };
            const message = messageMap[agent.code] || "Halo kak M, saya mau tanya unitnya";
            const encoded = encodeURIComponent(message);

            await firePixelAndWait(utm, agent.code);

            // ✅ Semua device pakai wa.me — tidak ada popup blocker
            window.location.href = "https://wa.me/" + agent.number + "?text=" + encoded;
        }
    </script>
</head>
<body onload="rotate()">
    <div style="
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        height:100vh; font-family:sans-serif;
        color:#333; background:#f9f9f9;
    ">
        <svg width="56" height="56" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:16px">
            <circle cx="24" cy="24" r="24" fill="#25D366"/>

        <p style="font-size:16px;margin:0;font-weight:500">Menghubungkan ke WhatsApp...</p>
        <p style="font-size:13px;color:#888;margin-top:8px">Mohon tunggu sebentar</p>
    </div>
</body>
</html>
